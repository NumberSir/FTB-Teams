modLoader = "javafml"
loaderVersion = "[${neoforge_loader_version},)"
issueTrackerURL = "https://go.ftb.team/support-mod-issues"
license = "All Rights Reserved"

[[mods]]
modId = "ftbteams"
version = "${version}"
displayName = "FTB Teams"
authors = "FTB Team"
description = '''
FTB Teams adds ability to create your own teams that can be used for quests etc.
'''

[[dependencies.ftbteams]]
modId = "neoforge"
type  = "required"
versionRange = "${neoforge_version_range}"
ordering = "NONE"
side = "BOTH"

[[dependencies.ftbteams]]
modId = "minecraft"
type  = "required"
versionRange = "${minecraft_version_range_maven}"
ordering = "NONE"
side = "BOTH"

[[dependencies.ftbteams]]
modId = "ftblibrary"
type  = "required"
versionRange = "${ftb_library_version_range_maven}"
ordering = "AFTER"
side = "BOTH"
